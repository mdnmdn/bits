# bits Configuration (TOML format)
# Copy to ~/.config/coingecko-cli/config.toml

# Active provider (coingecko, binance, bitget)
provider = "coingecko"

# CoinGecko configuration
[coingecko]
api_key = ""
tier = "demo"  # demo or paid
base_url = ""  # optional custom endpoint

# Binance configuration (shared API key for all markets)
[binance]
api_key = ""
api_secret = ""
base_url = ""  # optional custom endpoint

# Binance market-specific settings
[binance.spot]
enabled = true  # default if nothing specified

[binance.margin]
enabled = false

[binance.futures]
enabled = false
use_testnet = false

# Bitget configuration (shared API key for all markets)
[bitget]
api_key = ""
api_secret = ""
passphrase = ""
base_url = ""  # optional custom endpoint

# Bitget market-specific settings
[bitget.spot]
enabled = true  # default if nothing specified

[bitget.futures]
enabled = false

# Symbol resolution cache settings
[symbol]
cache_ttl = "5m"
# cache_dir = ""  # defaults to system temp directory
