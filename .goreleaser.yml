version: 2

project_name: cg

builds:
  - binary: cg
    main: .
    ldflags:
      - -s -w -X github.com/coingecko/coingecko-cli/cmd.version={{.Version}} -X github.com/coingecko/coingecko-cli/cmd.commit={{.Commit}} -X github.com/coingecko/coingecko-cli/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

