version: 2

project_name: bits

builds:
  - binary: bits
    main: .
    ldflags:
      - -s -w -X github.com/mdnmdn/bits/cmd.version={{.Version}} -X github.com/mdnmdn/bits/cmd.commit={{.Commit}} -X github.com/mdnmdn/bits/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

brews:
  - repository:
      owner: mdnmdn
      name: homebrew-bits
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/mdnmdn/bits
    description: bits CLI — cryptocurrency data at your fingertips
    license: MIT
    install: |
      bin.install "bits"
    test: |
      system "#{bin}/bits", "version"
