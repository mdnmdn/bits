# API Examples Configuration
# Used by the bits-api-explorer tool to invoke provider REST APIs directly.
#
# Usage:
#   go run api-explorer.go                          # Interactive TUI mode
#   go run api-explorer.go --provider binance --endpoint "Price Ticker"  # CLI mode
#   go run api-explorer.go --provider binance --endpoint "Klines" --param symbol=BTCUSDT --param interval=1h

[providers.binance]
name = "Binance"
base_url = "https://api.binance.com"
api_key_env = "BINANCE_API_KEY"

  [[providers.binance.endpoints]]
  name = "Server Time"
  category = "general"
  method = "GET"
  path = "/api/v3/time"
  description = "Returns the current server time in milliseconds"

  [[providers.binance.endpoints]]
  name = "Exchange Info"
  category = "general"
  method = "GET"
  path = "/api/v3/exchangeInfo"
  description = "Returns trading rules and symbol configuration"

    [[providers.binance.endpoints.examples]]
    label = "All symbols"

    [[providers.binance.endpoints.examples]]
    label = "Single symbol"
    params = { symbol = "BTCUSDT" }

  [[providers.binance.endpoints]]
  name = "Price Ticker"
  category = "market"
  method = "GET"
  path = "/api/v3/ticker/price"
  description = "Latest price for a symbol"

    [[providers.binance.endpoints.examples]]
    label = "BTC/USDT"
    params = { symbol = "BTCUSDT" }

    [[providers.binance.endpoints.examples]]
    label = "ETH/USDT"
    params = { symbol = "ETHUSDT" }

    [[providers.binance.endpoints.examples]]
    label = "SOL/USDT"
    params = { symbol = "SOLUSDT" }

    [[providers.binance.endpoints.examples]]
    label = "All prices"

  [[providers.binance.endpoints]]
  name = "24hr Ticker"
  category = "market"
  method = "GET"
  path = "/api/v3/ticker/24hr"
  description = "24-hour rolling window price change statistics"

    [[providers.binance.endpoints.examples]]
    label = "BTC/USDT"
    params = { symbol = "BTCUSDT" }

    [[providers.binance.endpoints.examples]]
    label = "ETH/BTC"
    params = { symbol = "ETHBTC" }

    [[providers.binance.endpoints.examples]]
    label = "All tickers"

  [[providers.binance.endpoints]]
  name = "Book Ticker"
  category = "market"
  method = "GET"
  path = "/api/v3/ticker/bookTicker"
  description = "Best price/qty on the order book"

    [[providers.binance.endpoints.examples]]
